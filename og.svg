<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="ambient" cx="50%" cy="62%" r="70%">
      <stop offset="0%"  stop-color="#39FF88" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#39FF88" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#39FF88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sediment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#39FF88" stop-opacity="0"/>
      <stop offset="100%" stop-color="#39FF88" stop-opacity="0.22"/>
    </linearGradient>
    <radialGradient id="rigGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#39FF88" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#39FF88" stop-opacity="0"/>
    </radialGradient>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#39FF88"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#050807"/>
  <rect width="1200" height="630" fill="url(#ambient)"/>

  <!-- corner brand -->
  <text x="60" y="90" font-family="American Typewriter, serif" font-size="56" fill="#FFFCF8">b3nd</text>

  <!-- corner status -->
  <g transform="translate(60, 110)">
    <circle cx="6" cy="0" r="5" fill="#39FF88"/>
    <text x="22" y="5" font-family="JetBrains Mono, monospace" font-size="13" fill="#FFFCF8" opacity="0.65" letter-spacing="2.4">
      THE FRAMEWORK · FIRECAT TESTNET LIVE
    </text>
  </g>

  <!-- hero headline -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="600" letter-spacing="-3">
    <text x="60" y="290" font-size="148" fill="#FFFCF8">Build.</text>
    <text x="60" y="430" font-size="148" fill="#39FF88">Share.</text>
    <text x="60" y="570" font-size="148" fill="#FFFCF8">Own.</text>
  </g>

  <!-- rig visualization on the right -->
  <g transform="translate(740, 110)">
    <!-- frame -->
    <rect x="0" y="0" width="420" height="420" rx="20"
          fill="#0a0c0b" stroke="#1a1d1c" stroke-width="1.2"/>

    <!-- top label band -->
    <line x1="40" y1="60" x2="380" y2="60" stroke="#1a1d1c" stroke-dasharray="2 4" stroke-width="1"/>
    <text x="210" y="50" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#5a5d5c" letter-spacing="1.2">
      ↑ move · http · ws · grpc · mcp
    </text>

    <!-- rig glow -->
    <circle cx="210" cy="190" r="100" fill="url(#rigGlow)"/>

    <!-- you -->
    <circle cx="75" cy="190" r="30" fill="#0a0c0b" stroke="#FFFCF8" stroke-width="1.4"/>
    <text x="75" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#FFFCF8">you</text>
    <text x="75" y="235" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a5d5c" letter-spacing="2">signer</text>

    <!-- rig -->
    <rect x="165" y="158" width="90" height="64" rx="10" fill="#39FF88"/>
    <text x="210" y="183" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#050807" font-weight="700" letter-spacing="3">RIG</text>
    <text x="210" y="202" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#050807" letter-spacing="1.4">bend · move · save</text>
    <text x="210" y="214" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#050807" opacity="0.8">3 verbs · 1 surface</text>

    <!-- peer -->
    <circle cx="345" cy="190" r="30" fill="#0a0c0b" stroke="#FFFCF8" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="345" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#FFFCF8">peer</text>
    <text x="345" y="235" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a5d5c" letter-spacing="2">replica</text>

    <!-- edges -->
    <path d="M105,190 L165,190" stroke="#39FF88" stroke-width="2" marker-end="url(#ar)"/>
    <path d="M255,190 L315,190" stroke="#39FF88" stroke-width="2" marker-end="url(#ar)"/>

    <!-- verb labels -->
    <text x="135" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="2">bend</text>
    <text x="285" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="2">move</text>

    <!-- save line -->
    <line x1="40" y1="270" x2="380" y2="270" stroke="#1a1d1c" stroke-width="1" stroke-dasharray="2 4"/>
    <path d="M210,222 L210,268" stroke="#39FF88" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#ar)"/>
    <text x="222" y="258" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="2">save</text>

    <!-- sediment -->
    <rect x="0" y="270" width="420" height="150" fill="url(#sediment)"/>
    <text x="50" y="298" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="2">
      postgres · sqlite · s3 · ipfs · idb · fs
    </text>
    <text x="50" y="318" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="2">
      mongo · elasticsearch · localstorage · …
    </text>
    <text x="210" y="395" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a5d5c" letter-spacing="3">
      ↓ save · the network keeps a copy
    </text>
  </g>

  <!-- footer line -->
  <line x1="60" y1="582" x2="1140" y2="582" stroke="#1a1d1c" stroke-dasharray="2 4" stroke-width="1"/>
  <g transform="translate(60, 614)">
    <text font-family="JetBrains Mono, monospace" font-size="14" fill="#5a5d5c" letter-spacing="1.6">
      b3nd.org · build · share · own · the data-first framework
    </text>
  </g>
</svg>
